# ─── Release / dependency meta ───────────────────────────────────────────────
- name: release
  color: '0e8a16'
  description: Release-related PRs. Ignored by commit-title linter.
- name: dependencies
  color: '0366d6'
  description: Dependency updates. Auto-applied by Dependabot.
- name: size
  color: 'ededed'
  description: Parent for size/xs..size/xl applied by the bundle-size workflow.
- name: size/xs
  color: 'e6f4ea'
  description: Change set is ~50 lines or less.
- name: size/s
  color: 'c6e8c6'
  description: Change set is ~50–200 lines.
- name: size/m
  color: 'fef2c0'
  description: Change set is ~200–500 lines.
- name: size/l
  color: 'fbca04'
  description: Change set is ~500–1000 lines.
- name: size/xl
  color: 'd93f0b'
  description: Change set exceeds 1000 lines. Consider splitting.
