# Stellar Intel — canonical label taxonomy.
# Single source of truth; synced to GitHub by .github/workflows/label-sync.yml.
# Edit this file, merge to main, and the workflow will reconcile the repo labels.
#
# Naming rules:
#   - lower-case, hyphenated, namespaced with "/"
#   - one concern per namespace: epic/, module/, wave/, difficulty/
#   - state labels stay flat ("blocked", "help-wanted", "design-review")

# ─── Type ─────────────────────────────────────────────────────────────────────
- name: bug
  color: 'd73a4a'
  description: Something is broken. A user-visible defect or a broken invariant.
- name: feature
  color: '0e8a16'
  description: New capability. Expands what the product can do.
- name: enhancement
  color: 'a2eeef'
  description: Improvement to an existing capability (not a bug fix, not new scope).
- name: docs
  color: '0075ca'
  description: Documentation change — README, /docs, inline, or templates.
- name: refactor
  color: 'c2e0c6'
  description: Code structure change with no behaviour change.
- name: test
  color: 'bfd4f2'
  description: Adds or changes tests. No production behaviour change.
- name: chore
  color: 'ededed'
  description: Build, tooling, deps, repo meta. Not a user-visible change.
- name: question
  color: 'd876e3'
  description: Triage question — needs a decision or clarification.

# ─── State ────────────────────────────────────────────────────────────────────
- name: blocked
  color: 'b60205'
  description: Cannot progress — waiting on another issue, anchor, or external party.
- name: help-wanted
  color: '008672'
  description: Actively looking for a contributor to own this.
- name: good-first-issue
  color: '7057ff'
  description: Scoped, unblocked, reviewer-ready. Safe for a first-time contributor.
- name: design-review
  color: 'fbca04'
  description: Needs UX / product review before implementation starts.
- name: needs-triage
  color: 'e99695'
  description: New issue that a maintainer has not yet categorised.
- name: duplicate
  color: 'cfd3d7'
  description: Already tracked by another issue. Link and close.
- name: wontfix
  color: 'ffffff'
  description: Out of scope or intentionally not addressed. Document why and close.
- name: stale
  color: 'bfbfbf'
  description: Auto-applied after 30 days of inactivity by the stale action.
- name: pinned
  color: '006b75'
  description: Exempt from the stale action. Load-bearing tracking issues.
- name: security
  color: '7a0000'
  description: Security concern. Exempt from stale. Escalate to SECURITY.md flow.

# ─── Difficulty ───────────────────────────────────────────────────────────────
- name: difficulty/good-first-issue
  color: '7057ff'
  description: '< 2 hours, self-contained, clear acceptance criteria.'
- name: difficulty/intermediate
  color: 'c5def5'
  description: '~1 day of work. Touches one module. No cross-cutting concerns.'
- name: difficulty/hard
  color: '1d76db'
  description: Multi-day. Cross-module or requires design work first.

