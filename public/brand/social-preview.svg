<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img"
  aria-label="Stellar Intel — execution layer for stablecoin value on Stellar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#17204a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#3ad29f"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- soft radial accent -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="980" cy="140" r="180" fill="#7c5cff"/>
    <circle cx="1080" cy="520" r="160" fill="#3ad29f"/>
  </g>

  <!-- grid suggestion -->
  <g stroke="#2a335c" stroke-width="1" opacity="0.35">
    <path d="M0 200 H1280 M0 440 H1280 M400 0 V640 M860 0 V640"/>
  </g>

  <!-- brand mark block -->
  <g transform="translate(80,96)">
    <rect width="14" height="14" fill="url(#accent)"/>
    <rect y="22" width="14" height="14" fill="url(#accent)" opacity="0.75"/>
    <rect y="44" width="14" height="14" fill="url(#accent)" opacity="0.5"/>
    <text x="34" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
      font-size="20" fill="#cfd6ff" letter-spacing="2">STELLAR INTEL</text>
  </g>

  <!-- headline -->
  <text x="80" y="260" font-family="Inter, Helvetica, Arial, sans-serif"
    font-size="84" font-weight="700" fill="#ffffff">
    Execution layer for
  </text>
  <text x="80" y="352" font-family="Inter, Helvetica, Arial, sans-serif"
    font-size="84" font-weight="700" fill="url(#accent)">
    stablecoin value on Stellar.
  </text>

  <!-- subline -->
  <text x="80" y="432" font-family="Inter, Helvetica, Arial, sans-serif"
    font-size="28" fill="#aab1d9">
    Intent router · reputation oracle · agent surface.
  </text>

  <!-- footer chips -->
  <g transform="translate(80,512)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="18" fill="#cfd6ff">
    <g>
      <rect width="122" height="36" rx="18" fill="#1a2350" stroke="#33407a"/>
      <text x="18" y="24">SEP-24</text>
    </g>
    <g transform="translate(138,0)">
      <rect width="122" height="36" rx="18" fill="#1a2350" stroke="#33407a"/>
      <text x="18" y="24">SEP-38</text>
    </g>
    <g transform="translate(276,0)">
      <rect width="146" height="36" rx="18" fill="#1a2350" stroke="#33407a"/>
      <text x="18" y="24">Soroban</text>
    </g>
    <g transform="translate(438,0)">
      <rect width="120" height="36" rx="18" fill="#1a2350" stroke="#33407a"/>
      <text x="18" y="24">MCP</text>
    </g>
  </g>

  <!-- domain tag -->
  <text x="1200" y="608" text-anchor="end"
    font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
    font-size="18" fill="#7884b5">stellar-intel.vercel.app</text>
</svg>
